site_name: Charter Platform Docs
site_description: Charter 自動化測試平台（DA40）文件站（預覽）
docs_dir: docs

# NOTE: this mkdocs.yml lives inside docs/charter_site/, and our markdown pages are
# stored in the same directory (not in a nested ./docs). So set docs_dir to ".".

site_url: ""
repo_url: ""
repo_name: ""

theme:
  name: material
  language: zh-TW
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - toc
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

# Click-to-zoom images (lightbox-like) for better readability on topology/screenshots.
extra_javascript:
  - https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js
  - assets/js/zoom.js

extra_css:
  - assets/css/custom.css

